<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feelo — Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="font-size:40px;margin-bottom:8px">💙</div>
      <div class="auth-logo">feelo</div>
      <p class="auth-tagline">Junte-se a quem também quer se expressar</p>
      <input type="text" class="auth-input" placeholder="Seu nome de usuário">
      <input type="email" class="auth-input" placeholder="Seu email">
      <input type="password" class="auth-input" placeholder="Crie uma senha">
      <input type="password" class="auth-input" placeholder="Confirme a senha">
      <button class="auth-btn" onclick="window.location.href='index.html'">Criar conta</button>
      <p class="auth-switch">Já tem uma conta? <a href="login.html">Entrar</a></p>
    </div>
  </div>
</body>
</html>
